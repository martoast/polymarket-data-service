services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP:-1000}'
        WWWUSER: '${WWWUSER:-1000}'
    image: polymarket-data-service
    container_name: polymarket-app
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${APP_PORT:-8001}:80'
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: pgsql
      DB_PORT: 5432
      DB_DATABASE: '${DB_DATABASE:-polymarket}'
      DB_USERNAME: '${DB_USERNAME:-sail}'
      DB_PASSWORD: '${DB_PASSWORD:-password}'
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      RECORDER_ENABLED: 'false'   # recorder runs in its own container below
    mem_limit: 384m
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sail
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost/api/health']
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  recorder:
    image: polymarket-data-service
    container_name: polymarket-recorder
    restart: unless-stopped
    entrypoint: ['php', '/var/www/html/artisan', 'recorder:start']
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: pgsql
      DB_PORT: 5432
      DB_DATABASE: '${DB_DATABASE:-polymarket}'
      DB_USERNAME: '${DB_USERNAME:-sail}'
      DB_PASSWORD: '${DB_PASSWORD:-password}'
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    mem_limit: 256m
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      app:
        condition: service_healthy   # wait for migrations + serve to be ready
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sail

  recorder-weather:
    image: polymarket-data-service
    container_name: polymarket-recorder-weather
    restart: unless-stopped
    entrypoint: ['php', '/var/www/html/artisan', 'weather:start']
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: pgsql
      DB_PORT: 5432
      DB_DATABASE: '${DB_DATABASE:-polymarket}'
      DB_USERNAME: '${DB_USERNAME:-sail}'
      DB_PASSWORD: '${DB_PASSWORD:-password}'
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    mem_limit: 192m
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      app:
        condition: service_healthy
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sail

  pgsql:
    image: timescale/timescaledb:latest-pg16
    container_name: polymarket-pgsql
    restart: unless-stopped
    # Override TimescaleDB's auto-tune (defaults to 25% RAM = 3.8 GB on this machine).
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=25
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c statement_timeout=30000
      -c random_page_cost=1.1
      -c timescaledb.max_background_workers=4
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: '${DB_DATABASE:-polymarket}'
      POSTGRES_USER: '${DB_USERNAME:-sail}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-password}'
    mem_limit: 1500m
    memswap_limit: 1500m
    volumes:
      - sail-pgsql:/var/lib/postgresql/data
    networks:
      - sail
    healthcheck:
      test: ['CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE:-polymarket}', '-U', '${DB_USERNAME:-sail}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: polymarket-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    mem_limit: 192m
    volumes:
      - sail-redis:/data
    networks:
      - sail
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  sail:
    driver: bridge

volumes:
  sail-pgsql:
    driver: local
  sail-redis:
    driver: local
  vendor_data:
    driver: local
